# ─────────────────────────────────────────────────────────────────────────────
#  application-prod.properties  —  RAILWAY PRODUCTION PROFILE
#
#  Activated by setting:   SPRING_PROFILES_ACTIVE=prod
#  in the Railway service's Variables panel.
# ─────────────────────────────────────────────────────────────────────────────

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (Railway PostgreSQL) ─────────────────────────────────────────────
# Railway injects DATABASE_URL as:  postgresql://user:pass@host:port/db
# Spring/JDBC needs:                jdbc:postgresql://host:port/db
#
# DataSourceConfig.java parses and converts the URL automatically.
# Do NOT also set spring.datasource.url here — it would conflict with
# the DataSource bean produced by DataSourceConfig.
#
# The only env var you need on Railway is DATABASE_URL
# (injected automatically by the PostgreSQL plugin — no manual copy-paste).

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Disable H2 console in production ─────────────────────────────────────────
spring.h2.console.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.familybudget=INFO
logging.level.org.springframework=WARN
