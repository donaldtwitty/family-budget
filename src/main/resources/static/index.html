<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Budget" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1b4332" />
  <title>Family Budget</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
</head>
<body>

  <header id="hdr">
    <div class="hdr-top">
      <div class="hdr-branding">
        <h1 class="app-name">Family Budget</h1>
        <p class="app-month" id="hlbl"></p>
      </div>
      <div class="hdr-right">
        <p class="save-msg" id="savemsg" aria-live="polite"></p>
        <p class="income-label">Monthly Income</p>
        <p class="income-value" id="hinc"></p>
      </div>
    </div>

    <div class="balance-card">
      <p class="balance-label">Monthly Balance</p>
      <p class="balance-amount" id="hbal"></p>
      <div class="balance-stats">
        <div class="balance-stat">
          <p class="stat-label">Bills</p>
          <p class="stat-value" id="hbills"></p>
        </div>
        <div class="balance-stat">
          <p class="stat-label">Spent</p>
          <p class="stat-value" id="hspent"></p>
        </div>
        <div class="balance-stat">
          <p class="stat-label">Debt</p>
          <p class="stat-value" id="hdebt"></p>
        </div>
        <div class="balance-stat">
          <p class="stat-label">Goals</p>
          <p class="stat-value" id="hgoals"></p>
        </div>
      </div>
    </div>
  </header>

  <main id="content"></main>

  <nav id="nav" aria-label="Main navigation">
    <button class="nav-tab active" data-action="set-tab" data-tab="home" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>

    <button class="nav-tab" data-action="set-tab" data-tab="bills">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>Bills</span>
    </button>

    <button class="nav-tab nav-tab--spend" data-action="set-tab" data-tab="spend" aria-label="Log spending">
      <div class="nav-tab__fab" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <line x1="12" y1="5" x2="12" y2="19" stroke-linecap="round"/>
          <line x1="5" y1="12" x2="19" y2="12" stroke-linecap="round"/>
        </svg>
      </div>
      <span>Spend</span>
    </button>

    <button class="nav-tab" data-action="set-tab" data-tab="goals">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
      <span>Goals</span>
    </button>

    <button class="nav-tab" data-action="set-tab" data-tab="debts">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      <span>Debts</span>
    </button>
  </nav>

  <div id="overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="sheet" role="document">
      <div class="sheet-header">
        <h2 class="sheet-title" id="sh-ttl"></h2>
        <button class="sheet-close" data-action="hide-modal" aria-label="Close dialog">✕</button>
      </div>
      <div class="sheet-body" id="sh-body"></div>
    </div>
  </div>

  <!--
    Script load order (dependency chain):
      data  → utils → api → state → render → modals → receipt → pin → app
    api.js is new — it must load before state.js so apiLoadData / apiSaveData
    are available when loadAppData() runs.
  -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/receipt.js"></script>
  <script src="js/pin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
