# ─────────────────────────────────────────────────────────────────────────────
#  application.properties  —  LOCAL DEVELOPMENT (default profile)
#
#  Uses H2 in-memory database so you can run the app locally without
#  installing PostgreSQL. Schema is auto-created by Hibernate.
#
#  For Railway / production, set the environment variables listed in
#  application-prod.properties — Railway will inject DATABASE_URL automatically.
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=family-budget

# ── Server ────────────────────────────────────────────────────────────────────
# Railway injects PORT automatically; default to 8080 locally.
server.port=${PORT:8080}

# ── Database (H2 for local dev) ───────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:familybudget;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console — handy for local debugging (disable in prod)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.familybudget=DEBUG
logging.level.org.springframework.security=WARN

# ── Activate prod profile on Railway ─────────────────────────────────────────
# Railway sets RAILWAY_ENVIRONMENT=production.
# The prod profile is loaded automatically via SPRING_PROFILES_ACTIVE env var.
