# railway.toml — Railway deployment configuration
# Docs: https://docs.railway.app/reference/config-as-code

[build]
# Tell Railway to use the Dockerfile (auto-detected, but explicit is better)
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Health-check endpoint — Railway waits for a 200 before routing traffic
healthcheckPath = "/api/health"
healthcheckTimeout = 60          # seconds to wait for first healthy response

# Restart the service automatically on crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
